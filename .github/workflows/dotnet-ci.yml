name: .NET CI

on:
  push:
    branches: [main, feat/dotnet-api-migration]
    paths:
      - 'apps/api-dotnet/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    paths:
      - 'apps/api-dotnet/**'
      - '.github/workflows/dotnet-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-dotnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore api-dotnet.sln

      - name: Build
        run: dotnet build api-dotnet.sln --configuration Release --no-restore /warnaserror

      - name: Test
        run: dotnet test api-dotnet.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: |
            apps/api-dotnet/**/TestResults/*.trx
            apps/api-dotnet/**/TestResults/**/coverage.cobertura.xml
